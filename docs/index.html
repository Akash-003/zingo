<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zingo — Daily status app</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1c1c19;
      background: #fcf9f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container { max-width: 480px; text-align: center; }
    .badge {
      display: inline-block;
      background: #f97316;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 16px;
    }
    h1 { font-size: 2.25rem; font-weight: 800; color: #9d3d2c; margin-bottom: 10px; }
    p.tagline { font-size: 1rem; color: #3a3530; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    a {
      color: #9d3d2c;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      border-bottom: 1px solid #ebe8e3;
      padding-bottom: 2px;
    }
    a:hover { border-color: #9d3d2c; }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Zingo</span>
    <h1>Zingo</h1>
    <p class="tagline">Your face. Your name. On every card. Every day.</p>
    <div class="links">
      <a href="/privacy-policy">Privacy Policy</a>
      <a href="/terms-conditions">Terms and Conditions</a>
    </div>
  </div>
</body>
</html>
