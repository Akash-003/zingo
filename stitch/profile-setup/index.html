<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Setup - Kindred</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#31302d",
                        "on-primary-container": "#fffbff",
                        "primary-fixed-dim": "#ffb4a5",
                        "secondary": "#5a614a",
                        "surface-container-high": "#ebe8e3",
                        "primary-fixed": "#ffdad3",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f3f0eb",
                        "primary-container": "#bd5541",
                        "surface": "#fcf9f4",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#56423e",
                        "outline": "#89726d",
                        "surface-variant": "#e5e2dd",
                        "on-error": "#ffffff",
                        "tertiary": "#615c4e",
                        "on-primary-fixed-variant": "#802919",
                        "surface-bright": "#fcf9f4",
                        "on-secondary-container": "#5e664e",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#171e0b",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#c2caad",
                        "on-secondary-fixed-variant": "#424a33",
                        "tertiary-fixed": "#eae2d0",
                        "on-background": "#1c1c19",
                        "outline-variant": "#ddc0bb",
                        "tertiary-container": "#7a7465",
                        "on-primary-fixed": "#3f0400",
                        "secondary-fixed": "#dee6c8",
                        "surface-container-low": "#f6f3ee",
                        "surface-dim": "#dcdad5",
                        "on-surface": "#1c1c19",
                        "primary": "#9d3d2c",
                        "error-container": "#ffdad6",
                        "surface-container": "#f0ede9",
                        "background": "#fcf9f4",
                        "secondary-container": "#dbe3c5",
                        "tertiary-fixed-dim": "#cec6b5",
                        "on-tertiary-fixed": "#1f1b10",
                        "inverse-primary": "#ffb4a5",
                        "surface-tint": "#a03f2e",
                        "surface-container-highest": "#e5e2dd",
                        "on-tertiary-fixed-variant": "#4b4639",
                        "on-tertiary-container": "#fffbff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcf9f4;
            color: #1c1c19;
        }
        .serif-headline {
            font-family: 'Noto Serif', serif;
        }
        .stationery-card {
            box-shadow: 0 8px 24px rgba(28, 28, 25, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 sm:p-12 overflow-x-hidden">
<!-- Suppress Shell: Transactional Screen logic applied -->
<main class="w-full max-w-xl mx-auto flex flex-col items-center space-y-12">
<!-- Header Section -->
<header class="text-center space-y-4">
<h1 class="serif-headline text-5xl md:text-6xl font-bold text-on-surface tracking-tight">
                Make it yours
            </h1>
<p class="text-on-surface-variant text-lg max-w-md mx-auto leading-relaxed">
                Your name and photo will appear on every card you share
            </p>
</header>
<!-- Preview Section (Intentional Asymmetry) -->
<section class="relative w-full py-8 flex justify-center">
<!-- Decorative Background Element -->
<div class="absolute inset-0 -z-10 bg-secondary-container/20 rounded-xl blur-3xl scale-90 translate-x-4"></div>
<!-- The Live Card Preview -->
<div class="stationery-card bg-surface-container-lowest p-8 rounded-lg w-full max-w-sm transform rotate-1 hover:rotate-0 transition-transform duration-500 ease-out border border-outline-variant/10">
<div class="flex flex-col space-y-6">
<div class="h-1 bg-primary/20 w-12 rounded-full"></div>
<p class="serif-headline text-2xl italic text-on-surface leading-snug">
                        “The beauty of belonging is that it transforms a space into a sanctuary.”
                    </p>
<div class="flex items-center space-y-0 space-x-4 pt-4">
<div class="relative">
<div class="w-12 h-12 rounded-full bg-surface-container-high overflow-hidden border-2 border-surface">
<img alt="Profile Placeholder" class="w-full h-full object-cover opacity-40 grayscale" data-alt="Soft ethereal portrait placeholder of a person with minimalist aesthetic and grainy texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQSV1TRgCX5yr5GV_4JYiURQKj7wh3vHcPkqW6JpwgTcV_ckT-evAcCIwdlOa15rJPghNdd2E33ZdK23nr3qBemQFiW5Xy7vIi9fnHMLOVyQqL9xarEjfxX3Dy_LAtbiI6mewHtgsoF725AiCzt8mW7xkBc1Ix3hXZcxbGxQehllB8FAHbXOH6EoUVTWISpy20DJOqeh4FfJpRT37G8e-uikXffRuILxfmcLjIiOdjHSQGnOJ_GpThAwXRK_qzPWio29StsSVofzs"/>
</div>
<div class="absolute -bottom-1 -right-1 bg-primary text-white p-1 rounded-full text-[10px]">
<span class="material-symbols-outlined !text-[14px]">edit</span>
</div>
</div>
<div class="flex flex-col">
<span class="font-bold text-on-surface text-sm tracking-wide">Your Name</span>
<span class="text-xs text-on-surface-variant uppercase tracking-widest font-semibold">Kindred Spirit</span>
</div>
</div>
</div>
</div>
</section>
<!-- Form Section -->
<section class="w-full space-y-10">
<div class="flex flex-col items-center space-y-6">
<!-- Circular Upload Button -->
<button class="group flex flex-col items-center space-y-3 transition-all">
<div class="w-24 h-24 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center group-hover:border-primary group-hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary">add_a_photo</span>
</div>
<span class="text-sm font-semibold text-primary uppercase tracking-widest">Add your photo</span>
</button>
<!-- Text Input -->
<div class="w-full relative">
<label class="absolute -top-3 left-4 bg-surface px-2 text-xs font-bold text-outline uppercase tracking-widest" for="user-name">Your Name</label>
<input class="w-full h-16 px-6 bg-surface-container-low border-none rounded-DEFAULT text-on-surface text-lg focus:ring-2 focus:ring-primary/20 transition-shadow placeholder:text-on-surface-variant/40" id="user-name" placeholder="What should we call you?" type="text"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col items-center space-y-6 pt-4">
<button class="w-full h-16 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-full text-lg shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center space-x-2">
<span>Start Exploring</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="text-on-surface-variant font-semibold hover:text-on-surface transition-colors flex items-center space-x-1 group">
<span class="opacity-60 group-hover:opacity-100">Skip for now</span>
</button>
</div>
</section>
</main>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-20 pointer-events-none opacity-40">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-fixed-dim/30 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary-fixed/30 rounded-full blur-[120px]"></div>
</div>
</body></html>
