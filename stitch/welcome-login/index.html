<p class="font-headline italic text-sm leading-relaxed text-on-surface">
                        "The simplest moments often hold the most profound weight."
                    </p>
<div class="flex items-center gap-2 pt-1">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="text-[10px] font-label text-stone-400 uppercase tracking-widest">A. Rivera</span>
</div>
</div>

<button class="cta-height w-full h-12 bg-gradient-to-r from-primary to-primary-container text-white rounded-full font-semibold flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-md shadow-primary/10">
<span class="material-symbols-outlined text-xl" data-icon="phone">phone</span>
<span class="text-sm">Continue with Phone Number</span>
</button>

<p class="text-[10px] leading-relaxed text-stone-400 max-w-[280px] mx-auto">
            By continuing, you agree to our <a class="underline hover:text-primary" href="#">Terms</a> and <a class="underline hover:text-primary" href="#">Privacy</a>.
