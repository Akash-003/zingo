<!DOCTYPE html>

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar (Transactional: Nav Suppressed per Rules) -->
<header class="fixed top-0 w-full z-50 bg-stone-50/70 dark:bg-stone-900/70 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-stone-200/50 transition-colors active:opacity-80 active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="text-2xl font-serif italic text-orange-900 dark:text-orange-200">Kindred</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-24 pb-12 max-w-md mx-auto w-full">
<!-- Hero Visual (Soft, Aesthetic Background) -->
<div class="w-full mb-12 relative">
<div class="aspect-[4/3] rounded-lg overflow-hidden bg-surface-container-low">
<img class="w-full h-full object-cover opacity-80 mix-blend-multiply" data-alt="Soft focused aesthetic photo of a warm vintage writing desk with a fountain pen and textured cream paper in golden morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1MqYt00mcIJVxHklfdNMmvEeE9m-IrI1uV9KxhkitHmiAMTG7whbQq0Z-1zDOZgwZHybdWYLNIHAzGJR7gdt_S4cRW3KG2FSfawPBYciZhd4YIjrwdhhYCRAPpoiz0-witztFIJwjhxIeJwM8Kto_ZixS-sGXlMRD_iA9YEL46kaOOw3NGXLx81xEbPCCPpzfjxy3uVoBNnmcruZ9JwN6a-TiTmXQTauiaTp-iTJVDpjeGWoedOm0_YvpwAq63XF-DP7KFL22xgE"/>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
</div>
<!-- Content Section -->
<div class="w-full space-y-8">
<div class="space-y-3">
<h1 class="text-3xl font-serif font-bold text-on-surface leading-tight">Enter your phone number</h1>
<p class="text-on-surface-variant text-md leading-relaxed">We'll send you a verification code</p>
</div>
<!-- Input Group -->
<div class="space-y-6">
<div class="flex gap-3 h-14">
<!-- Country Selector -->
<div class="flex items-center gap-2 px-4 bg-surface-container-low rounded-DEFAULT border-none focus-within:bg-surface-container-lowest transition-all cursor-pointer">
<span class="text-sm font-semibold text-on-surface">🇮🇳 +91</span>
<span class="material-symbols-outlined text-sm text-outline" data-icon="expand_more">expand_more</span>
</div>
<!-- Phone Input -->
<div class="flex-grow relative">
<input autofocus="" class="w-full h-full bg-surface-container-low rounded-DEFAULT border-none px-6 focus:ring-0 focus:bg-surface-container-lowest text-on-surface placeholder:text-outline/60 text-lg tracking-wider" placeholder="Phone number" type="tel"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-semibold rounded-full shadow-lg shadow-primary/10 active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Send OTP</span>
<span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Privacy Note -->
<div class="flex items-start gap-3 p-4 bg-surface-container/30 rounded-DEFAULT">
<span class="material-symbols-outlined text-secondary text-xl" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
<p class="text-sm text-on-surface-variant/80 italic leading-snug">
                    We'll never share your number
                </p>
</div>
</div>
</main>
<!-- Footer Disclaimer -->
<footer class="p-8 text-center">
<p class="text-[11px] text-outline uppercase tracking-[0.2em] font-medium opacity-60">
            Secure Verification Powered by Kindred
        </p>
</footer>
<!-- Bottom Navigation (Suppressed for focused entry screen) -->
</body></html>
